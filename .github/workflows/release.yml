name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125" \
            "cmake;3.22.1" \
          2>/dev/null
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          python3 -c "
import base64, os
data = ''.join(os.environ['KEYSTORE_B64'].split())
with open('android/app/keystore/release.keystore', 'wb') as f:
    f.write(base64.b64decode(data))
"

      - name: Configure Android signing & APK naming
        run: python3 scripts/configure-android.py
        env:
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Get version
        id: ver
        run: |
          echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ghost Poster v${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/ghost-poster-${{ steps.ver.outputs.VERSION }}.apk
